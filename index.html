<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transmisión Multimedial</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }

        /* Contenedor principal vertical */
        .multi-player-container {
            background: linear-gradient(135deg, #1e1e1e, #2a2a2a);
            width: 340px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            padding: 20px;
            border: 1px solid #333;
            gap: 20px;
        }

        /* Sección de Video */
        .video-section {
            width: 100%;
        }

        .stream-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 10px;
            text-align: center;
            color: #fff;
            min-height: 24px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden; /* Evita que títulos largos rompan el diseño */
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* Relación 16:9 */
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .video-wrapper iframe, .video-wrapper .offline-placeholder {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        /* Imagen/Placa Offline */
        .video-wrapper .offline-placeholder {
            background-color: #151515;
            background-image: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=600&auto=format&fit=crop'); /* Puedes cambiar esta URL por tu propia imagen en Git */
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 10px;
            z-index: 10; /* Se superpone al reproductor cuando no hay vivo */
            transition: opacity 0.5s ease;
            padding: 15px;
            text-align: center;
        }

        .offline-placeholder span {
            font-size: 0.9rem;
            color: #ffc107;
            font-weight: 500;
            background: rgba(0,0,0,0.6);
            padding: 5px 10px;
            border-radius: 20px;
        }

        /* Ocultar elementos suavemente */
        .hidden {
            opacity: 0 !important;
            pointer-events: none;
        }

        /* Separador */
        .divider {
            height: 1px;
            background: linear-gradient(to right, transparent, #444, transparent);
            width: 100%;
        }

        /* Sección Audio Horizontal */
        .audio-section {
            width: 100%;
        }

        .audio-horizontal-player {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 12px 15px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .btn-audio-play {
            background-color: #fff;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
            transition: transform 0.2s ease;
        }

        .btn-audio-play:hover {
            transform: scale(1.05);
        }

        .btn-audio-play svg {
            width: 24px;
            height: 24px;
            fill: #121212;
        }

        .audio-info-controls {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex-grow: 1;
        }

        .audio-label {
            font-size: 0.85rem;
            font-weight: 500;
            color: #ddd;
        }

        .audio-status-container {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background-color: #555;
            border-radius: 50%;
        }

        .status-dot.active {
            background-color: #00ff66;
            box-shadow: 0 0 6px #00ff66;
        }

        .volume-container {
            display: flex;
            align-items: center;
            gap: 6px;
            width: 100%;
        }

        .volume-container svg {
            width: 16px;
            height: 16px;
            fill: #888;
        }

        .volume-slider {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            border-radius: 2px;
            background: #444;
            outline: none;
            cursor: pointer;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="multi-player-container">
        
        <div class="video-section">
            <div class="stream-title" id="youtubeTitle">Buscando señal...</div>
            <div class="video-wrapper">
                <div class="offline-placeholder" id="offlinePlaceholder">
                    <span>Transmisión no disponible</span>
                </div>
                <div id="ytPlayer"></div>
            </div>
        </div>

        <div class="divider"></div>

        <div class="audio-section">
            <div class="audio-horizontal-player">
                <button class="btn-audio-play" id="audioPlayBtn" title="Reproducir Radio">
                    <svg id="audioPlayIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                </button>
                
                <div class="audio-info-controls">
                    <div class="audio-status-container">
                        <span class="audio-label">Señal de Audio</span>
                        <span class="status-dot" id="audioStatusDot"></span>
                        <span id="audioStatusText">Detenido</span>
                    </div>
                    
                    <div class="volume-container">
                        <svg viewBox="0 0 24 24"><path d="M18.5 12A4.5 4.5 0 0 0 16 8v8a4.5 4.5 0 0 0 2.5-4M5 9v6h4l5 5V4L9 9H5z"/></svg>
                        <input type="range" class="volume-slider" id="audioVolume" min="0" max="1" step="0.05" value="0.8">
                        <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <audio id="audioStream" src="https://01.solumedia.com.ar:8014/stream?icy=http" preload="none"></audio>

    <script>
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        let ytPlayer;
        let checkLiveInterval;
        let isLiveActive = false;

        const youtubeTitle = document.getElementById('youtubeTitle');
        const offlinePlaceholder = document.getElementById('offlinePlaceholder');
        const audioStream = document.getElementById('audioStream');
        const audioPlayBtn = document.getElementById('audioPlayBtn');
        const audioPlayIcon = document.getElementById('audioPlayIcon');
        const audioStatusDot = document.getElementById('audioStatusDot');
        const audioStatusText = document.getElementById('audioStatusText');
        const audioVolume = document.getElementById('audioVolume');

        const svgPlay = "M8 5v14l11-7z";
        const svgPause = "M6 19h4V5H6v14zm8-14v14h4V5h-4z";

        function onYouTubeIframeAPIReady() {
            initYoutubePlayer();
        }

        function initYoutubePlayer() {
            ytPlayer = new YT.Player('ytPlayer', {
                height: '100%',
                width: '100%',
                videoId: 'live_stream',
                playerVars: {
                    'channel': 'UCoUj9R__8Hj9N5SF90mm5gw',
                    'autoplay': 1,
                    'mute': 1,
                    'controls': 1,
                    'rel': 0
                },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function onPlayerReady(event) {
            verificarTransmision();
            
            // Polling en tiempo real (cada 30 segundos comprueba si cambió el estado)
            if (!checkLiveInterval) {
                checkLiveInterval = setInterval(() => {
                    if (!isLiveActive) {
                        if (ytPlayer && typeof ytPlayer.loadVideoById === 'function') {
                            ytPlayer.loadVideoById({
                                videoId: 'live_stream',
                                startSeconds: 0
                            });
                            ytPlayer.mute(); 
                        }
                        verificarTransmision();
                    }
                }, 30000);
            }
        }

        function verificarTransmision() {
            setTimeout(() => {
                if (ytPlayer && typeof ytPlayer.getPlayerState === 'function') {
                    const state = ytPlayer.getPlayerState();
                    
                    if (state === YT.PlayerState.PLAYING || state === YT.PlayerState.BUFFERING) {
                        marcarComoEnVivo();
                    } else {
                        // Estado offline: Muestra placa e indica que no hay vivo
                        youtubeTitle.textContent = "No hay ninguna transmisión en vivo";
                        offlinePlaceholder.classList.remove('hidden');
                        isLiveActive = false;
                    }
                }
            }, 4000);
        }

        function marcarComoEnVivo() {
            isLiveActive = true;
            
            // Extrae el nombre real configurado en la transmisión de YouTube
            if (ytPlayer && typeof ytPlayer.getVideoData === 'function') {
                const videoData = ytPlayer.getVideoData();
                if (videoData && videoData.title) {
                    youtubeTitle.textContent = "🔴 " + videoData.title;
                } else {
                    youtubeTitle.textContent = "🔴 Transmisión en Vivo";
                }
            }

            // Oculta la placa offline para dejar ver el video
            offlinePlaceholder.classList.add('hidden');
            
            // Frena la radio de audio automáticamente
            pauseAudioStream();
        }

        function onPlayerStateChange(event) {
            if (event.data === YT.PlayerState.PLAYING) {
                marcarComoEnVivo();
            }
        }

        // --- MANEJO DEL STREAM DE AUDIO ---
        audioPlayBtn.addEventListener('click', () => {
            if (audioStream.paused) {
                if (ytPlayer && typeof ytPlayer.pauseVideo === 'function') {
                    ytPlayer.pauseVideo();
                }

                audioStream.load();
                audioStream.play()
                    .then(() => {
                        audioPlayIcon.setAttribute('d', svgPause);
                        audioStatusText.textContent = 'En Vivo';
                        audioStatusDot.classList.add('active');
                    })
                    .catch(error => {
                        console.error("Error en streaming de audio:", error);
                        audioStatusText.textContent = 'Error';
                    });
            } else {
                pauseAudioStream();
            }
        });

        function pauseAudioStream() {
            audioStream.pause();
            audioPlayIcon.setAttribute('d', svgPlay);
            audioStatusText.textContent = 'Detenido';
            audioStatusDot.classList.remove('active');
        }

        audioVolume.addEventListener('input', (e) => {
            audioStream.volume = e.target.value;
        });
    </script>
</body>
</html>
