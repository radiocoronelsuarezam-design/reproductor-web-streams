<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reproductor Radio Coronel Suárez</title>
    <style>
        /* Diseño principal y responsivo */
        :root {
            --bg-color: #1e1e24;
            --container-bg: #2b2b36;
            --text-main: #f5f5f5;
            --text-muted: #a0a0a0;
            --accent: #e63946;
            --accent-hover: #d62828;
            --radius: 12px;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            min-height: 100vh; /* Cambiado a min-height para evitar desbordes extremos */
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }

        .media-player-container {
            width: 90vmin;    /* Se adapta proporcionalmente al lado más corto de la ventana (ancho o alto) */
            max-width: 600px; /* Límite máximo para pantallas grandes */
            max-height: 90vh; /* Evita que el contenedor colapse o se corte en pantallas bajas */
            
            background: var(--container-bg);
            border-radius: var(--radius);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Sección de Video */
        .video-section {
            width: 100%;
            border-bottom: 2px solid #1e1e24;
            position: relative;
        }

        .video-header {
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.2);
        }

        .video-title {
            margin: 0;
            font-size: 1.1rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* Relación de aspecto 16:9 */
            background-color: #000;
        }

        #yt-player {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .offline-banner {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #2b2b36 0%, #1e1e24 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .offline-icon {
            font-size: 3rem;
            margin-bottom: 15px;
            color: var(--text-muted);
        }

        /* Sección de Audio */
        .audio-section {
            padding: 20px;
            background: var(--container-bg);
        }

        .audio-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .audio-title {
            margin: 0;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .live-indicator {
            width: 10px;
            height: 10px;
            background-color: var(--accent);
            border-radius: 50%;
            display: inline-block;
            animation: pulse 1.5s infinite;
        }

        .audio-status {
            font-size: 0.9rem;
            color: var(--text-muted);
            font-style: italic;
        }

        audio {
            width: 100%;
            height: 40px;
            outline: none;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(230, 57, 70, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(230, 57, 70, 0); }
            100% { box-shadow: 0 0 0 0 rgba(230, 57, 70, 0); }
        }
    </style>
</head>
<body>

    <div class="media-player-container">
        <div class="video-section">
            <div class="video-header">
                <h2 id="yt-status-title" class="video-title">Buscando transmisión...</h2>
            </div>
            <div class="video-wrapper">
                <div id="loading-banner" class="offline-banner" style="display: flex;">
                    <div class="offline-icon">⏳</div>
                    <h3>Buscando transmisión...</h3>
                </div>

                <iframe id="yt-player" 
                    src="https://www.youtube.com/embed/live_stream?channel=UCoUj9R__8Hj9N5SF90mm5gw&enablejsapi=1" 
                    allow="autoplay; encrypted-media; fullscreen" 
                    allowfullscreen>
                </iframe>
                
                <div id="offline-banner" class="offline-banner" style="display: none;">
                    <div class="offline-icon">📡</div>
                    <h3 style="margin: 0;">No hay transmisión en este momento</h3>
                    <p style="color: var(--text-muted); font-size: 0.85rem; margin: 10px 0;">Buscando nuevos directos de @radiocoronelsuarez...</p>
                </div>
            </div>
        </div>

        <div class="audio-section">
            <div class="audio-header">
                <h2 class="audio-title"><span class="live-indicator"></span> Radio en vivo</h2>
                <span id="audio-status" class="audio-status">Detenido</span>
            </div>
            <audio id="radio-audio" controls preload="none">
                <source src="https://01.solumedia.com.ar:8014/stream?icy=http" type="audio/mpeg">
                Tu navegador no soporta el elemento de audio.
            </audio>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        // --- VARIABLES GLOBALES ---
        let ytPlayer;
        let ytPollingInterval;
        let audioRetryInterval;
        let audioRetryTime = 0;
        const maxRetryTime = 60000; // 60 segundos de reconexión

        const radioAudio = document.getElementById('radio-audio');
        const audioStatusText = document.getElementById('audio-status');
        const ytTitleText = document.getElementById('yt-status-title');
        const loadingBanner = document.getElementById('loading-banner');
        const offlineBanner = document.getElementById('offline-banner');
        const iframeEl = document.getElementById('yt-player');

        // --- LÓGICA DE YOUTUBE ---
        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('yt-player', {
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange,
                    'onError': onPlayerError
                }
            });
        }

        function onPlayerReady(event) {
            const videoData = ytPlayer.getVideoData();
            if (!videoData || !videoData.video_id) {
                setYTOffline();
            } else {
                setYTLive(videoData.title);
            }
        }

        function onPlayerStateChange(event) {
            const state = event.data;
            
            if (state == YT.PlayerState.PLAYING) {
                const videoData = ytPlayer.getVideoData();
                if (videoData && videoData.title) {
                    setYTLive(videoData.title);
                }
                
                if (!radioAudio.paused) {
                    radioAudio.pause();
                    audioStatusText.innerText = 'Detenido';
                }
            }
            
            if (state == YT.PlayerState.ENDED) {
                setYTOffline();
            }
        }

        function onPlayerError(event) {
            setYTOffline();
        }

        function setYTLive(title) {
            stopYTPolling();
            loadingBanner.style.display = 'none';
            offlineBanner.style.display = 'none';
            
            if (title && title.trim() !== "") {
                ytTitleText.innerText = title;
            } else {
                ytTitleText.innerText = "Transmisión en Vivo";
            }
        }

        function setYTOffline() {
            loadingBanner.style.display = 'none';
            offlineBanner.style.display = 'flex';
            ytTitleText.innerText = "No hay transmisión en este momento";
            startYTPolling();
        }

        function startYTPolling() {
            if (!ytPollingInterval) {
                ytPollingInterval = setInterval(() => {
                    const currentSrc = iframeEl.src;
                    iframeEl.src = ''; 
                    setTimeout(() => { iframeEl.src = currentSrc; }, 100);
                }, 60000); 
            }
        }

        function stopYTPolling() {
            if (ytPollingInterval) {
                clearInterval(ytPollingInterval);
                ytPollingInterval = null;
            }
        }

        // --- LÓGICA DE AUDIO (RADIO STREAM) ---
        
        radioAudio.addEventListener('play', () => {
            audioStatusText.innerText = 'Conectando...';
        });

        radioAudio.addEventListener('playing', () => {
            audioStatusText.innerText = 'Reproduciendo';
            clearInterval(audioRetryInterval);
            audioRetryInterval = null;
            audioRetryTime = 0;

            if (ytPlayer && typeof ytPlayer.pauseVideo === 'function') {
                const ytState = ytPlayer.getPlayerState();
                if (ytState === YT.PlayerState.PLAYING || ytState === YT.PlayerState.BUFFERING) {
                    ytPlayer.pauseVideo();
                }
            }
        });

        radioAudio.addEventListener('pause', () => {
            if (audioStatusText.innerText !== 'Reconectando...' && audioStatusText.innerText !== 'Desconectado') {
                audioStatusText.innerText = 'Detenido';
            }
        });

        radioAudio.addEventListener('waiting', () => {
            audioStatusText.innerText = 'Cargando/Buffering...';
        });

        function handleAudioError() {
            if (radioAudio.paused && audioStatusText.innerText !== 'Reconectando...') return; 

            audioStatusText.innerText = 'Reconectando...';
            
            if (!audioRetryInterval) {
                audioRetryInterval = setInterval(() => {
                    audioRetryTime += 5000; 
                    
                    if (audioRetryTime >= maxRetryTime) {
                        clearInterval(audioRetryInterval);
                        audioRetryInterval = null;
                        audioRetryTime = 0;
                        audioStatusText.innerText = 'Desconectado';
                        radioAudio.pause();
                        
                        radioAudio.src = "https://01.solumedia.com.ar:8014/stream?icy=http"; 
                    } else {
                        const timestamp = new Date().getTime();
                        radioAudio.src = "https://01.solumedia.com.ar:8014/stream?icy=http&t=" + timestamp;
                        radioAudio.play().catch(e => {});
                    }
                }, 5000);
            }
        }

        radioAudio.addEventListener('error', handleAudioError);
        radioAudio.addEventListener('stalled', handleAudioError);

    </script>
</body>
</html>
