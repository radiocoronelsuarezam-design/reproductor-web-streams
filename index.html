<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transmisión Multimedial</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #fff;
            padding: 15px;
            overflow-x: hidden;
        }

        /* --- CONTENEDOR RESPONSIVO CORREGIDO --- */
        .multi-player-container {
            background: linear-gradient(135deg, #1e1e1e, #2a2a2a);
            width: 100%; 
            max-width: 480px; 
            display: flex;
            flex-direction: column;
            /* Se añade más padding abajo (26px) para que no muerda el diseño */
            padding: 22px 20px 26px 20px; 
            border: 1px solid #333;
            border-radius: 16px;
            gap: 22px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }

        /* Sección de Video */
        .video-section {
            width: 100%;
        }

        .stream-title {
            font-size: 1.15rem; 
            font-weight: 600;
            margin-bottom: 12px;
            text-align: center;
            color: #fff;
            min-height: 26px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden; 
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            padding-top: 56.25%; 
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .video-wrapper iframe, .video-wrapper .offline-placeholder {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        /* Imagen/Placa Offline */
        .video-wrapper .offline-placeholder {
            background-color: #151515;
            background-image: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=600&auto=format&fit=crop'); 
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 12px;
            z-index: 10; 
            transition: opacity 0.5s ease;
            padding: 15px;
            text-align: center;
        }

        .offline-placeholder span {
            font-size: 0.95rem;
            color: #ffc107;
            font-weight: 500;
            background: rgba(0,0,0,0.7);
            padding: 6px 12px;
            border-radius: 20px;
        }

        .hidden {
            opacity: 0 !important;
            pointer-events: none;
        }

        /* Separador */
        .divider {
            height: 1px;
            background: linear-gradient(to right, transparent, #444, transparent);
            width: 100%;
        }

        /* Sección Audio Horizontal Ampliada */
        .audio-section {
            width: 100%;
        }

        .audio-horizontal-player {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 14px;
            padding: 18px 16px; /* Más margen interno para centrar todo bien */
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .btn-audio-play {
            background-color: #fff;
            border: none;
            width: 50px; 
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
            transition: transform 0.2s ease;
        }

        .btn-audio-play:hover {
            transform: scale(1.05);
        }

        .btn-audio-play svg {
            width: 26px; 
            height: 26px;
            fill: #121212;
        }

        .audio-info-controls {
            display: flex;
            flex-direction: column;
            gap: 12px; /* Espaciado interno perfecto entre texto y barra */
            flex-grow: 1;
            min-width: 0; 
        }

        .audio-status-container {
            display: flex;
            align-items: center;
            width: 100%;
        }

        .audio-label {
            font-size: 0.75rem;
            font-weight: 600;
            color: #bbb;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Alineación derecha */
        .audio-live-indicator {
            margin-left: auto; 
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 7px;
            height: 7px;
            background-color: #555;
            border-radius: 50%;
        }

        .status-dot.active {
            background-color: #00ff66;
            box-shadow: 0 0 6px #00ff66;
        }

        .status-dot.blink {
            background-color: #ffc107;
            box-shadow: 0 0 6px #ffc107;
            animation: pulse-dot 1s infinite alternate;
        }

        @keyframes pulse-dot {
            from { opacity: 0.4; }
            to { opacity: 1; }
        }

        .volume-container {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
            flex-wrap: nowrap; 
        }

        .volume-container svg {
            width: 16px;
            height: 16px;
            fill: #888;
            flex-shrink: 0; 
        }

        .volume-slider {
            -webkit-appearance: none;
            appearance: none;
            flex-grow: 1; 
            width: 100%;
            height: 5px; 
            border-radius: 3px;
            background: #444;
            outline: none;
            cursor: pointer;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 13px;
            height: 13px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
        }

        .audioStatusText {
            font-size: 0.75rem;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="multi-player-container">
        
        <div class="video-section">
            <div class="stream-title" id="youtubeTitle">Buscando señal...</div>
            <div class="video-wrapper">
                <div class="offline-placeholder" id="offlinePlaceholder">
                    <span>Transmisión no disponible</span>
                </div>
                <div id="ytPlayer"></div>
            </div>
        </div>

        <div class="divider"></div>

        <div class="audio-section">
            <div class="audio-horizontal-player">
                <button class="btn-audio-play" id="audioPlayBtn" title="Reproducir Radio">
                    <svg id="audioPlayIcon" viewBox="0 0 24 24"><path id="audioPlayPath" d="M8 5v14l11-7z"/></svg>
                </button>
                
                <div class="audio-info-controls">
                    <div class="audio-status-container">
                        <span class="audio-label">Radio en vivo</span>
                        
                        <div class="audio-live-indicator">
                            <span class="status-dot" id="audioStatusDot"></span>
                            <span class="audioStatusText" id="audioStatusText">Detenido</span>
                        </div>
                    </div>
                    
                    <div class="volume-container">
                        <svg viewBox="0 0 24 24"><path d="M18.5 12A4.5 4.5 0 0 0 16 8v8a4.5 4.5 0 0 0 2.5-4M5 9v6h4l5 5V4L9 9H5z"/></svg>
                        <input type="range" class="volume-slider" id="audioVolume" min="0" max="1" step="0.05" value="0.8">
                        <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <audio id="audioStream" src="https://01.solumedia.com.ar:8014/stream?icy=http" preload="none"></audio>

    <script>
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        let ytPlayer;
        let checkLiveInterval;
        let isLiveActive = false;
        let audioTimeout; 

        const youtubeTitle = document.getElementById('youtubeTitle');
        const offlinePlaceholder = document.getElementById('offlinePlaceholder');
        const audioStream = document.getElementById('audioStream');
        const audioPlayBtn = document.getElementById('audioPlayBtn');
        const audioPlayPath = document.getElementById('audioPlayPath');
        const audioStatusDot = document.getElementById('audioStatusDot');
        const audioStatusText = document.getElementById('audioStatusText');
        const audioVolume = document.getElementById('audioVolume');

        const svgPlay = "M8 5v14l11-7z";
        const svgPause = "M6 19h4V5H6v14zm8-14v14h4V5h-4z";

        function onYouTubeIframeAPIReady() {
            initYoutubePlayer();
        }

        function initYoutubePlayer() {
            ytPlayer = new YT.Player('ytPlayer', {
                height: '100%',
                width: '100%',
                videoId: 'live_stream',
                playerVars: {
                    'channel': 'UCoUj9R__8Hj9N5SF90mm5gw',
                    'autoplay': 1,
                    'mute': 1,
                    'controls': 1,
                    'rel': 0
                },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function onPlayerReady(event) {
            verificarTransmision();
            
            if (!checkLiveInterval) {
                checkLiveInterval = setInterval(() => {
                    if (!isLiveActive) {
                        if (ytPlayer && typeof ytPlayer.loadVideoById === 'function') {
                            ytPlayer.loadVideoById({
                                videoId: 'live_stream',
                                startSeconds: 0
                            });
                            ytPlayer.mute(); 
                        }
                        verificarTransmision();
                    }
                }, 30000);
            }
        }

        function verificarTransmision() {
            setTimeout(() => {
                if (ytPlayer && typeof ytPlayer.getPlayerState === 'function') {
                    const state = ytPlayer.getPlayerState();
                    const videoData = ytPlayer.getVideoData();
                    const hasValidTitle = videoData && videoData.title && videoData.title !== "" && !videoData.title.includes("live_stream");

                    if ((state === YT.PlayerState.PLAYING || state === YT.PlayerState.BUFFERING) && hasValidTitle) {
                        marcarComoEnVivo();
                    } else {
                        marcarComoOffline();
                    }
                }
            }, 4000);
        }

        function marcarComoEnVivo() {
            isLiveActive = true;
            if (ytPlayer && typeof ytPlayer.getVideoData === 'function') {
                const videoData = ytPlayer.getVideoData();
                if (videoData && videoData.title) {
                    youtubeTitle.textContent = videoData.title;
                } else {
                    youtubeTitle.textContent = "🔴 Transmisión en Vivo";
                }
            }
            offlinePlaceholder.classList.add('hidden');
            pauseAudioStream();
        }

        function marcarComoOffline() {
            youtubeTitle.textContent = "No hay ninguna transmisión en vivo";
            offlinePlaceholder.classList.remove('hidden');
            isLiveActive = false;
        }

        function onPlayerStateChange(event) {
            if (event.data === YT.PlayerState.PLAYING) {
                const videoData = ytPlayer.getVideoData();
                if (videoData && videoData.title && !videoData.title.includes("live_stream")) {
                    marcarComoEnVivo();
                } else {
                    marcarComoOffline();
                }
            }
        }

        // --- MANEJO DEL STREAM DE AUDIO ---
        audioPlayBtn.addEventListener('click', () => {
            if (audioStream.paused) {
                if (ytPlayer && typeof ytPlayer.pauseVideo === 'function') {
                    ytPlayer.pauseVideo();
                }

                audioStream.load();
                setAudioStatus('Connecting');
                
                audioStream.play()
                    .then(() => {
                        setAudioStatus('Live');
                    })
                    .catch(error => {
                        console.error("Error en streaming de audio:", error);
                        setAudioStatus('Error');
                    });
            } else {
                pauseAudioStream();
            }
        });

        function pauseAudioStream() {
            audioStream.pause();
            audioStream.src = ""; 
            audioStream.load();
            audioStream.src = "https://01.solumedia.com.ar:8014/stream?icy=http";
            setAudioStatus('Stopped');
        }

        function setAudioStatus(status) {
            clearTimeout(audioTimeout); 

            switch (status) {
                case 'Live':
                    audioPlayPath.setAttribute('d', svgPause);
                    audioStatusText.textContent = 'Reproduciendo';
                    audioStatusDot.className = 'status-dot active';
                    break;
                case 'Connecting':
                    audioPlayPath.setAttribute('d', svgPause);
                    audioStatusText.textContent = 'Conectando...';
                    audioStatusDot.className = 'status-dot blink';
                    break;
                case 'Buffering':
                    audioStatusText.textContent = 'Conectando...';
                    audioStatusDot.className = 'status-dot blink';
                    audioTimeout = setTimeout(() => {
                        console.log("Corte de red detectado por falta de datos.");
                        handleNetworkCut();
                    }, 5000);
                    break;
                case 'Stopped':
                    audioPlayPath.setAttribute('d', svgPlay);
                    audioStatusText.textContent = 'Detenido';
                    audioStatusDot.className = 'status-dot';
                    break;
                case 'Error':
                default:
                    audioPlayPath.setAttribute('d', svgPlay);
                    audioStatusText.textContent = 'Error';
                    audioStatusDot.className = 'status-dot';
                    break;
            }
        }

        function handleNetworkCut() {
            audioStream.pause();
            audioStream.src = "";
            audioStream.load();
            audioStream.src = "https://01.solumedia.com.ar:8014/stream?icy=http";
            setAudioStatus('Error');
        }

        audioStream.addEventListener('playing', () => {
            setAudioStatus('Live');
        });

        audioStream.addEventListener('waiting', () => {
            if (!audioStream.paused) {
                setAudioStatus('Buffering');
            }
        });

        audioStream.addEventListener('stalled', () => {
            if (!audioStream.paused) {
                setAudioStatus('Buffering');
            }
        });

        audioStream.addEventListener('error', () => {
            handleNetworkCut();
        });

        audioVolume.addEventListener('input', (e) => {
            audioStream.volume = e.target.value;
        });
    </script>
</body>
</html>
