<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transmisión Multimedial</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #141414;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #fff;
            padding: 15px;
            overflow-x: hidden;
            position: relative;
        }

        /* --- FONDO ANIMADO PREMIUM (CSS PURO) --- */
        .animated-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, #1e1e24 0%, #0f0f12 100%);
            z-index: -1;
            overflow: hidden;
        }

        .animated-bg::before, .animated-bg::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg,
                transparent 45%,
                rgba(255, 255, 255, 0.03) 48%,
                rgba(255, 255, 255, 0.08) 50%,
                rgba(255, 255, 255, 0.03) 52%,
                transparent 55%
            );
            background-size: 200% 200%;
            animation: lightSweep 8s linear infinite;
        }

        .animated-bg::after {
            background: linear-gradient(
                135deg,
                transparent 40%,
                rgba(255, 193, 7, 0.015) 47%,
                rgba(255, 193, 7, 0.04) 50%,
                rgba(255, 193, 7, 0.015) 53%,
                transparent 60%
            );
            animation: lightSweep 14s linear infinite reverse;
        }

        @keyframes lightSweep {
            0% { transform: translate(-10%, -10%); }
            100% { transform: translate(10%, 10%); }
        }

        /* --- CONTENEDOR RESPONSIVO Y ESCALADO --- */
        .multi-player-container {
            background: rgba(30, 30, 30, 0.75);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            width: 100%; 
            max-width: 480px; 
            display: flex;
            flex-direction: column;
            padding: 24px; 
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 16px;
            gap: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            z-index: 1;
            transition: all 0.3s ease;
        }

        /* Sección de Video */
        .video-section {
            width: 100%;
        }

        .stream-title {
            font-size: 1.25rem; 
            font-weight: 600;
            margin-bottom: 14px;
            text-align: center;
            color: #fff;
            min-height: 28px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden; 
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            padding-top: 56.25%; 
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .video-wrapper iframe, .video-wrapper .offline-placeholder {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        /* Imagen/Placa Offline */
        .video-wrapper .offline-placeholder {
            background-color: #151515;
            background-image: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=600&auto=format&fit=crop'); 
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 12px;
            z-index: 10; 
            transition: opacity 0.5s ease;
            padding: 20px;
            text-align: center;
        }

        .offline-placeholder span {
            font-size: 1rem;
            color: #ffc107;
            font-weight: 500;
            background: rgba(0,0,0,0.7);
            padding: 6px 14px;
            border-radius: 20px;
        }

        .hidden {
            opacity: 0 !important;
            pointer-events: none;
        }

        /* Separador */
        .divider {
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.15), transparent);
            width: 100%;
        }

        /* Sección Audio Ampliada */
        .audio-section {
            width: 100%;
        }

        .audio-horizontal-player {
            background: rgba(26, 26, 26, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            padding: 16px 20px; 
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .btn-audio-play {
            background-color: #fff;
            border: none;
            width: 54px; 
            height: 54px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn-audio-play:hover {
            transform: scale(1.06);
            box-shadow: 0 0 14px rgba(255, 255, 255, 0.25);
        }

        .btn-audio-play svg {
            width: 28px; 
            height: 28px;
            fill: #121212;
        }

        .audio-info-controls {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex-grow: 1;
        }

        .audio-status-container {
            display: flex;
            align-items: center;
            width: 100%; /* Toma todo el ancho para poder separar los extremos */
        }

        .audio-label {
            font-size: 0.8rem;
            font-weight: 600;
            color: #ccc;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Contenedor dinámico que se va por completo a la derecha */
        .audio-live-indicator {
            margin-left: auto; /* Empuja el bloque de estado hacia la derecha */
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #555;
            border-radius: 50%;
        }

        .status-dot.active {
            background-color: #00ff66;
            box-shadow: 0 0 8px #00ff66;
        }

        .status-dot.blink {
            background-color: #ffc107;
            box-shadow: 0 0 8px #ffc107;
            animation: pulse-dot 1s infinite alternate;
        }

        @keyframes pulse-dot {
            from { opacity: 0.4; }
            to { opacity: 1; }
        }

        .volume-container {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
            margin-top: 2px;
        }

        .volume-container svg {
            width: 18px;
            height: 18px;
            fill: #aaa;
        }

        .volume-slider {
            -webkit-appearance: none;
            width: 100%;
            height: 5px; 
            border-radius: 3px;
            background: #444;
            outline: none;
            cursor: pointer;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
        }

        .audioStatusText {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="animated-bg"></div>

    <div class="multi-player-container">
        
        <div class="video-section">
            <div class="stream-title" id="youtubeTitle">Buscando señal...</div>
            <div class="video-wrapper">
                <div class="offline-placeholder" id="offlinePlaceholder">
                    <span>Transmisión no disponible</span>
                </div>
                <div id="ytPlayer"></div>
            </div>
        </div>

        <div class="divider"></div>

        <div class="audio-section">
            <div class="audio-horizontal-player">
                <button class="btn-audio-play" id="audioPlayBtn" title="Reproducir Radio">
                    <svg id="audioPlayIcon" viewBox="0 0 24 24"><path id="audioPlayPath" d="M8 5v14l11-7z"/></svg>
                </button>
                
                <div class="audio-info-controls">
                    <div class="audio-status-container">
                        <span class="audio-label">Radio en vivo</span>
                        
                        <div class="audio-live-indicator">
                            <span class="status-dot" id="audioStatusDot"></span>
                            <span class="audioStatusText" id="audioStatusText">Detenido</span>
                        </div>
                    </div>
                    
                    <div class="volume-container">
                        <svg viewBox="0 0 24 24"><path d="M18.5 12A4.5 4.5 0 0 0 16 8v8a4.5 4.5 0 0 0 2.5-4M5 9v6h4l5 5V4L9 9H5z"/></svg>
                        <input type="range" class="volume-slider" id="audioVolume" min="0" max="1" step="0.05" value="0.8">
                        <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <audio id="audioStream" src="https://01.solumedia.com.ar:8014/stream/;icy=http" preload="none" crossorigin="anonymous"></audio>

    <script>
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        let ytPlayer;
        let checkLiveInterval;
        let isLiveActive = false;
        let audioTimeout; 

        const STREAM_URL = "https://01.solumedia.com.ar:8014/stream/;icy=http";

        const youtubeTitle = document.getElementById('youtubeTitle');
        const offlinePlaceholder = document.getElementById('offlinePlaceholder');
        const audioStream = document.getElementById('audioStream');
        const audioPlayBtn = document.getElementById('audioPlayBtn');
        const audioPlayPath = document.getElementById('audioPlayPath');
        const audioStatusDot = document.getElementById('audioStatusDot');
        const audioStatusText = document.getElementById('audioStatusText');
        const audioVolume = document.getElementById('audioVolume');

        const svgPlay = "M8 5v14l11-7z";
        const svgPause = "M6 19h4V5H6v14zm8-14v14h4V5h-4z";

        function onYouTubeIframeAPIReady() {
            initYoutubePlayer();
        }

        function initYoutubePlayer() {
            ytPlayer = new YT.Player('ytPlayer', {
                height: '100%',
                width: '100%',
                videoId: 'live_stream',
                playerVars: {
                    'channel': 'UCoUj9R__8Hj9N5SF90mm5gw',
                    'autoplay': 1,
                    'mute': 1,
                    'controls': 1,
                    'rel': 0
                },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function onPlayerReady(event) {
            verificarTransmision();
            
            if (!checkLiveInterval) {
                checkLiveInterval = setInterval(() => {
                    if (!isLiveActive) {
                        if (ytPlayer && typeof ytPlayer.loadVideoById === 'function') {
                            ytPlayer.loadVideoById({
                                videoId: 'live_stream',
                                startSeconds: 0
                            });
                            ytPlayer.mute(); 
                        }
                        verificarTransmision();
                    }
                }, 30000);
            }
        }

        function verificarTransmision() {
            setTimeout(() => {
                if (ytPlayer && typeof ytPlayer.getPlayerState === 'function') {
                    const state = ytPlayer.getPlayerState();
                    const videoData = ytPlayer.getVideoData();
                    const hasValidTitle = videoData && videoData.title && videoData.title !== "" && !videoData.title.includes("live_stream");

                    if ((state === YT.PlayerState.PLAYING || state === YT.PlayerState.BUFFERING) && hasValidTitle) {
                        marcarComoEnVivo();
                    } else {
                        marcarComoOffline();
                    }
                }
            }, 4000);
        }

        function marcarComoEnVivo() {
            isLiveActive = true;
            if (ytPlayer && typeof ytPlayer.getVideoData === 'function') {
                const videoData = ytPlayer.getVideoData();
                if (videoData && videoData.title) {
                    youtubeTitle.textContent = videoData.title;
                } else {
                    youtubeTitle.textContent = "🔴 Transmisión en Vivo";
                }
            }
            offlinePlaceholder.classList.add('hidden');
            pauseAudioStream();
        }

        function marcarComoOffline() {
            youtubeTitle.textContent = "No hay ninguna transmisión en vivo";
            offlinePlaceholder.classList.remove('hidden');
            isLiveActive = false;
        }

        function onPlayerStateChange(event) {
            if (event.data === YT.PlayerState.PLAYING) {
                const videoData = ytPlayer.getVideoData();
                if (videoData && videoData.title && !videoData.title.includes("live_stream")) {
                    marcarComoEnVivo();
                } else {
                    marcarComoOffline();
                }
            }
        }

        // --- MANEJO DEL STREAM DE AUDIO ---
        audioPlayBtn.addEventListener('click', () => {
            if (audioStream.paused) {
                if (ytPlayer && typeof ytPlayer.pauseVideo === 'function') {
                    ytPlayer.pauseVideo();
                }

                audioStream.src = STREAM_URL + "&nocache=" + new Date().getTime();
                audioStream.load();
                setAudioStatus('Connecting');
                
                audioStream.play()
                    .then(() => {
                        setAudioStatus('Live');
                    })
                    .catch(error => {
                        console.error("Error en streaming de audio:", error);
                        setAudioStatus('Error');
                    });
            } else {
                pauseAudioStream();
            }
        });

        function pauseAudioStream() {
            audioStream.pause();
            audioStream.src = ""; 
            audioStream.load();
            setAudioStatus('Stopped');
        }

        function setAudioStatus(status) {
            clearTimeout(audioTimeout); 

            switch (status) {
                case 'Live':
                    audioPlayPath.setAttribute('d', svgPause);
                    audioStatusText.textContent = 'Reproduciendo';
                    audioStatusDot.className = 'status-dot active';
                    break;
                case 'Connecting':
                    audioPlayPath.setAttribute('d', svgPause);
                    audioStatusText.textContent = 'Conectando...';
                    audioStatusDot.className = 'status-dot blink';
                    break;
                case 'Buffering':
                    audioStatusText.textContent = 'Conectando...';
                    audioStatusDot.className = 'status-dot blink';
                    audioTimeout = setTimeout(() => {
                        console.log("Corte de datos prolongado del servidor de streaming.");
                        handleNetworkCut();
                    }, 6000);
                    break;
                case 'Stopped':
                    audioPlayPath.setAttribute('d', svgPlay);
                    audioStatusText.textContent = 'Detenido';
                    audioStatusDot.className = 'status-dot';
                    break;
                case 'Error':
                default:
                    audioPlayPath.setAttribute('d', svgPlay);
                    audioStatusText.textContent = 'Error';
                    audioStatusDot.className = 'status-dot';
                    break;
            }
        }

        function handleNetworkCut() {
            audioStream.pause();
            audioStream.src = "";
            audioStream.load();
            setAudioStatus('Error');
        }

        audioStream.addEventListener('playing', () => {
            setAudioStatus('Live');
        });

        audioStream.addEventListener('waiting', () => {
            if (!audioStream.paused) {
                setAudioStatus('Buffering');
            }
        });

        audioStream.addEventListener('stalled', () => {
            if (!audioStream.paused) {
                setAudioStatus('Buffering');
            }
        });

        audioStream.addEventListener('error', (e) => {
            console.error("Audio element error event triggered:", e);
            handleNetworkCut();
        });

        audioVolume.addEventListener('input', (e) => {
            audioStream.volume = e.target.value;
        });
    </script>
</body>
</html>
